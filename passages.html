<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — Steno Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
[data-theme="light"] { --bg:#f0f2f8; --card:#fff; --border:#e2e6f0; --text:#1a1f36; --muted:#6b7280; --accent:#2563eb; --err:#fee2e2; --err-text:#991b1b; --input:#fff; --input-border:#d1d5e0; }
[data-theme="dark"]  { --bg:#0d1117; --card:rgba(255,255,255,.05); --border:rgba(255,255,255,.1); --text:#f1f5f9; --muted:rgba(255,255,255,.45); --accent:#f0a500; --err:rgba(239,68,68,.15); --err-text:#fca5a5; --input:rgba(255,255,255,.07); --input-border:rgba(255,255,255,.12); }
body { background:var(--bg); color:var(--text); font-family:'Source Sans 3',sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; }
.card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:40px; width:360px; box-shadow:0 4px 24px rgba(0,0,0,.08); }
.brand { font-family:'Rajdhani',sans-serif; font-size:22px; font-weight:700; color:var(--text); letter-spacing:2px; text-align:center; margin-bottom:4px; }
.brand-sub { font-size:12px; color:var(--muted); text-align:center; letter-spacing:1px; margin-bottom:28px; }
label { display:block; font-size:12px; font-weight:600; color:var(--muted); margin-bottom:6px; letter-spacing:.5px; }
input { width:100%; padding:10px 14px; background:var(--input); color:var(--text); border:1px solid var(--input-border); border-radius:8px; font-size:14px; font-family:inherit; transition:border-color .2s; }
input:focus { outline:none; border-color:var(--accent); }
button { width:100%; margin-top:18px; padding:11px; background:var(--accent); color:#fff; border:none; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; font-family:'Rajdhani',sans-serif; letter-spacing:1px; transition:opacity .2s; }
button:hover { opacity:.88; }
.error { background:var(--err); color:var(--err-text); border-radius:8px; padding:10px 14px; font-size:13px; margin-bottom:16px; }
</style>
</head>
<body>
<div class="card">
  <div class="brand">Steno · ADMIN</div>
  <div class="brand-sub">STENO PORTAL CONTROL PANEL</div>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="post">
    <div style="margin-bottom:16px">
      <label>ADMIN PASSWORD</label>
      <input type="password" name="password" autofocus placeholder="Enter password" required>
    </div>
    <button type="submit">LOGIN →</button>
  </form>
</div>
<script>
const t = localStorage.getItem('ssc-admin-theme') || 'light';
document.documentElement.setAttribute('data-theme', t);
</script>
</body>
</html>
