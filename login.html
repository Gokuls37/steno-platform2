<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Error — Steno Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

[data-theme="light"] {
  --bg:           #f0f2f8;
  --sidebar-bg:   #1a1f36;
  --sidebar-text: rgba(255,255,255,.7);
  --sidebar-active: #ffffff;
  --sidebar-active-bg: rgba(255,255,255,.12);
  --sidebar-hover-bg:  rgba(255,255,255,.07);
  --topbar-bg:    #ffffff;
  --topbar-border:#e2e6f0;
  --card-bg:      #ffffff;
  --card-border:  #e2e6f0;
  --text:         #1a1f36;
  --text-muted:   #6b7280;
  --accent:       #2563eb;
  --accent-text:  #ffffff;
  --accent-light: #eff6ff;
  --danger:       #dc2626;
  --danger-light: #fef2f2;
  --success:      #16a34a;
  --success-light:#f0fdf4;
  --warning:      #d97706;
  --warning-light:#fffbeb;
  --table-stripe: #f8fafc;
  --table-border: #e9ecf3;
  --input-bg:     #ffffff;
  --input-border: #d1d5e0;
  --shadow:       0 2px 16px rgba(0,0,0,.07);
  --shadow-sm:    0 1px 4px rgba(0,0,0,.06);
  --badge-pass-bg:#dcfce7; --badge-pass-text:#166534;
  --badge-fail-bg:#fee2e2; --badge-fail-text:#991b1b;
  --badge-mid-bg: #fff7ed; --badge-mid-text: #9a3412;
}

[data-theme="dark"] {
  --bg:           #0d1117;
  --sidebar-bg:   #060a0f;
  --sidebar-text: rgba(255,255,255,.55);
  --sidebar-active: #f0a500;
  --sidebar-active-bg: rgba(240,165,0,.12);
  --sidebar-hover-bg:  rgba(255,255,255,.06);
  --topbar-bg:    rgba(255,255,255,.03);
  --topbar-border:rgba(255,255,255,.08);
  --card-bg:      rgba(255,255,255,.04);
  --card-border:  rgba(255,255,255,.09);
  --text:         #f1f5f9;
  --text-muted:   rgba(255,255,255,.45);
  --accent:       #f0a500;
  --accent-text:  #0d1117;
  --accent-light: rgba(240,165,0,.1);
  --danger:       #ef4444;
  --danger-light: rgba(239,68,68,.1);
  --success:      #22c55e;
  --success-light:rgba(34,197,94,.1);
  --warning:      #f59e0b;
  --warning-light:rgba(245,158,11,.1);
  --table-stripe: rgba(255,255,255,.02);
  --table-border: rgba(255,255,255,.07);
  --input-bg:     rgba(255,255,255,.06);
  --input-border: rgba(255,255,255,.12);
  --shadow:       none;
  --shadow-sm:    none;
  --badge-pass-bg:rgba(34,197,94,.15); --badge-pass-text:#4ade80;
  --badge-fail-bg:rgba(239,68,68,.15); --badge-fail-text:#fca5a5;
  --badge-mid-bg: rgba(245,158,11,.15);--badge-mid-text: #fbbf24;
}

body {
  font-family: 'Source Sans 3', sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  min-height: 100vh;
  transition: background .3s, color .3s;
}

/* ── SIDEBAR ── */
.sidebar {
  width: 220px;
  background: var(--sidebar-bg);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  z-index: 100;
  transition: background .3s;
}
.sidebar-brand {
  padding: 22px 20px 18px;
  border-bottom: 1px solid rgba(255,255,255,.08);
}
.sidebar-brand .brand-top {
  font-family: 'Rajdhani', sans-serif;
  font-size: 18px;
  font-weight: 700;
  color: #fff;
  letter-spacing: 2px;
}
.sidebar-brand .brand-sub {
  font-size: 10px;
  color: rgba(255,255,255,.4);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-top: 2px;
}
.sidebar-nav { flex: 1; padding: 12px 0; overflow-y: auto; }
.nav-section-label {
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: rgba(255,255,255,.25);
  padding: 14px 20px 6px;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 20px;
  color: var(--sidebar-text);
  text-decoration: none;
  font-size: 14px;
  font-weight: 400;
  cursor: pointer;
  transition: background .2s, color .2s;
  border-left: 3px solid transparent;
}
.nav-item:hover { background: var(--sidebar-hover-bg); color: #fff; }
.nav-item.active {
  background: var(--sidebar-active-bg);
  color: var(--sidebar-active);
  border-left-color: var(--sidebar-active);
  font-weight: 600;
}
.nav-item svg { width: 16px; height: 16px; flex-shrink: 0; opacity: .8; }
.sidebar-footer {
  padding: 14px 20px;
  border-top: 1px solid rgba(255,255,255,.08);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.sidebar-footer .admin-label { font-size: 12px; color: rgba(255,255,255,.4); }
.logout-btn {
  font-size: 12px;
  color: rgba(255,255,255,.5);
  text-decoration: none;
  padding: 4px 8px;
  border-radius: 4px;
  border: 1px solid rgba(255,255,255,.15);
  transition: all .2s;
}
.logout-btn:hover { background: rgba(255,255,255,.08); color: #fff; }

/* ── MAIN AREA ── */
.main-wrap {
  margin-left: 220px;
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}
.topbar {
  background: var(--topbar-bg);
  border-bottom: 1px solid var(--topbar-border);
  padding: 0 28px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 50;
}
.topbar-title {
  font-family: 'Rajdhani', sans-serif;
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: .5px;
}
.topbar-right { display: flex; align-items: center; gap: 10px; }

.theme-toggle {
  display: flex; align-items: center; gap: 6px;
  background: transparent;
  border: 1px solid var(--input-border);
  border-radius: 999px;
  padding: 5px 12px;
  cursor: pointer;
  font-size: 12px; font-weight: 600;
  color: var(--text-muted);
  letter-spacing: .8px;
  transition: all .2s;
}
.theme-toggle:hover { border-color: var(--accent); color: var(--accent); }
.theme-toggle svg { width: 13px; height: 13px; }

.content { padding: 24px 28px; flex: 1; }

/* ── STAT CARDS ── */
.stat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}
.stat-card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 12px;
  padding: 18px 20px;
  box-shadow: var(--shadow-sm);
}
.stat-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 8px;
}
.stat-value {
  font-family: 'Rajdhani', sans-serif;
  font-size: 32px;
  font-weight: 700;
  color: var(--text);
  line-height: 1;
}
.stat-value.accent { color: var(--accent); }
.stat-value.success { color: var(--success); }
.stat-value.danger  { color: var(--danger); }
.stat-sub { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

/* ── CARDS ── */
.card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 12px;
  box-shadow: var(--shadow-sm);
  margin-bottom: 20px;
  overflow: hidden;
}
.card-header {
  padding: 14px 20px;
  border-bottom: 1px solid var(--card-border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.card-title {
  font-family: 'Rajdhani', sans-serif;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: .5px;
  color: var(--text);
}
.card-body { padding: 20px; }

/* ── TABLE ── */
.tbl-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
thead th {
  background: var(--table-stripe);
  color: var(--text-muted);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 10px 14px;
  text-align: left;
  border-bottom: 1px solid var(--table-border);
  white-space: nowrap;
}
tbody tr { border-bottom: 1px solid var(--table-border); transition: background .15s; }
tbody tr:hover { background: var(--table-stripe); }
tbody tr:last-child { border-bottom: none; }
tbody td { padding: 10px 14px; color: var(--text); vertical-align: middle; }
tbody td.muted { color: var(--text-muted); }

/* ── BADGES ── */
.badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 600;
  white-space: nowrap;
}
.badge-pass    { background: var(--badge-pass-bg); color: var(--badge-pass-text); }
.badge-fail    { background: var(--badge-fail-bg); color: var(--badge-fail-text); }
.badge-mid     { background: var(--badge-mid-bg);  color: var(--badge-mid-text); }
.badge-neutral { background: var(--table-stripe);  color: var(--text-muted); border: 1px solid var(--table-border); }

/* ── BUTTONS ── */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 14px; border-radius: 7px;
  font-size: 13px; font-weight: 600; cursor: pointer;
  border: none; text-decoration: none; transition: all .2s;
}
.btn-primary { background: var(--accent); color: var(--accent-text); }
.btn-primary:hover { opacity: .88; }
.btn-outline {
  background: transparent; color: var(--text-muted);
  border: 1px solid var(--input-border);
}
.btn-outline:hover { border-color: var(--accent); color: var(--accent); }
.btn-danger { background: var(--danger-light); color: var(--danger); border: 1px solid rgba(220,38,38,.2); }
.btn-danger:hover { background: var(--danger); color: #fff; }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.btn-success { background: var(--success-light); color: var(--success); border: 1px solid rgba(22,163,74,.2); }
.btn-success:hover { background: var(--success); color: #fff; }

/* ── FORM ELEMENTS ── */
.form-group { margin-bottom: 14px; }
.form-label { display: block; font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 5px; letter-spacing: .5px; }
.form-control {
  width: 100%; padding: 8px 12px;
  background: var(--input-bg); color: var(--text);
  border: 1px solid var(--input-border); border-radius: 7px;
  font-size: 13px; font-family: inherit;
  transition: border-color .2s;
}
.form-control:focus { outline: none; border-color: var(--accent); }
.form-control-sm { padding: 5px 10px; font-size: 12px; }
textarea.form-control { resize: vertical; min-height: 80px; }
select.form-control { cursor: pointer; }

/* ── MISC ── */
.page-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 20px;
}
.page-title {
  font-family: 'Rajdhani', sans-serif;
  font-size: 22px; font-weight: 700; color: var(--text);
}
.chart-wrap { position: relative; height: 220px; }
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
@media(max-width:900px) { .two-col,.three-col { grid-template-columns: 1fr; } }

.toast {
  position: fixed; bottom: 24px; right: 24px;
  background: var(--card-bg); border: 1px solid var(--card-border);
  padding: 12px 18px; border-radius: 8px;
  font-size: 13px; font-weight: 600;
  box-shadow: 0 4px 20px rgba(0,0,0,.12);
  opacity: 0; pointer-events: none;
  transform: translateY(8px);
  transition: all .3s; z-index: 999;
}
.toast.show { opacity: 1; pointer-events: auto; transform: none; }
.toast.success { border-color: var(--success); color: var(--success); }
.toast.error   { border-color: var(--danger);  color: var(--danger); }

/* Modal */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.5); z-index: 200;
  align-items: center; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--card-bg); border: 1px solid var(--card-border);
  border-radius: 14px; padding: 24px; width: 480px; max-width: 95vw;
  box-shadow: 0 20px 60px rgba(0,0,0,.2);
}
.modal-title {
  font-family: 'Rajdhani', sans-serif;
  font-size: 18px; font-weight: 700; color: var(--text);
  margin-bottom: 18px;
}
.modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 18px; }

a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }
.text-muted { color: var(--text-muted); }
.text-sm { font-size: 12px; }
.mt-1 { margin-top: 6px; }
.mt-2 { margin-top: 12px; }
.flex { display: flex; align-items: center; }
.gap-2 { gap: 8px; }
.ml-auto { margin-left: auto; }
</style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-brand">
    <div class="brand-top">Steno · ADMIN</div>
    <div class="brand-sub">Steno Portal Control</div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section-label">Overview</div>
    <a href="{{ url_for('admin.dashboard') }}"
       class="nav-item {% if request.endpoint == 'admin.dashboard' %}active{% endif %}">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      Dashboard
    </a>
    <div class="nav-section-label">Students</div>
    <a href="{{ url_for('admin.students') }}"
       class="nav-item {% if 'students' in request.endpoint %}active{% endif %}">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      All Students
    </a>
    <div class="nav-section-label">Tests</div>
    <a href="{{ url_for('admin.attempts_list') }}"
       class="nav-item {% if 'attempt' in request.endpoint %}active{% endif %}">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      All Attempts
    </a>
    <div class="nav-section-label">Content</div>
    <a href="{{ url_for('admin.passages') }}"
       class="nav-item {% if 'passage' in request.endpoint %}active{% endif %}">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
      Passages
    </a>
    <div class="nav-section-label">Portal</div>
    <a href="/" target="_blank" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      Open Portal
    </a>
  </nav>
  <div class="sidebar-footer">
    <span class="admin-label">Admin</span>
    <a href="{{ url_for('admin.logout') }}" class="logout-btn">Logout</a>
  </div>
</aside>
<div class="main-wrap">
  <header class="topbar">
    <div class="topbar-title">Error</div>
    <div class="topbar-right">
      <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">
        <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
        <span id="themeLabel">Dark</span>
      </button>
    </div>
  </header>
  <div class="content">
    <div class="card" style="max-width:500px;margin:40px auto">
  <div class="card-body" style="text-align:center;padding:40px">
    <div style="font-size:40px;margin-bottom:16px">⚠️</div>
    <div style="font-size:16px;color:var(--danger);margin-bottom:12px">{{ message }}</div>
    <a href="{{ url_for('admin.dashboard') }}" class="btn btn-primary">← Dashboard</a>
  </div>
</div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
// Theme
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('themeLabel').textContent = t === 'dark' ? 'Light' : 'Dark';
  const icon = document.getElementById('themeIcon');
  icon.innerHTML = t === 'dark'
    ? '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>'
    : '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
}
function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme');
  const nxt = cur === 'dark' ? 'light' : 'dark';
  localStorage.setItem('ssc-admin-theme', nxt);
  applyTheme(nxt);
}
const saved = localStorage.getItem('ssc-admin-theme') || 'light';
applyTheme(saved);

// Toast
function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => t.className = 'toast', 3000);
}

// API helper
async function api(url, data) {
  const r = await fetch(url, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(data)
  });
  return r.json();
}

// Toast
function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => t.className = 'toast', 3000);
}


// API helper
async function api(url, data) {
  const r = await fetch(url, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(data)
  });
  return r.json();
}
</script>

</body>
