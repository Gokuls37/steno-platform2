<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Steno Skill Test Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* ── LIGHT THEME ─────────────────────────── */
  [data-theme="light"] {
    --bg:           #f0f2f8;
    --card-bg:      #ffffff;
    --card-border:  #e2e6f0;
    --text:         #1a1f36;
    --text-sub:     #6b7280;
    --label:        #4b5563;
    --input-bg:     #f7f8fc;
    --input-border: #d1d5e0;
    --input-focus:  #2563eb;
    --input-text:   #1a1f36;
    --placeholder:  #9ca3af;
    --accent:       #2563eb;
    --accent-text:  #ffffff;
    --red:          #dc2626;
    --toggle-bg:    #ffffff;
    --toggle-border:#d1d5e0;
    --toggle-text:  #374151;
    --shadow:       0 4px 28px rgba(0,0,0,.09);
    --emblem-border:rgba(37,99,235,.25);
    --emblem-bg:    rgba(37,99,235,.07);
    --emblem-color: #2563eb;
  }

  /* ── DARK THEME ──────────────────────────── */
  [data-theme="dark"] {
    --bg:           #0d1117;
    --card-bg:      rgba(255,255,255,.04);
    --card-border:  rgba(255,255,255,.1);
    --text:         #f1f5f9;
    --text-sub:     rgba(255,255,255,.45);
    --label:        rgba(255,255,255,.5);
    --input-bg:     rgba(255,255,255,.07);
    --input-border: rgba(255,255,255,.15);
    --input-focus:  #f0a500;
    --input-text:   #f1f5f9;
    --placeholder:  rgba(255,255,255,.25);
    --accent:       #f0a500;
    --accent-text:  #0d1117;
    --red:          #f87171;
    --toggle-bg:    rgba(255,255,255,.08);
    --toggle-border:rgba(255,255,255,.15);
    --toggle-text:  #f1f5f9;
    --shadow:       0 4px 28px rgba(0,0,0,.45);
    --emblem-border:rgba(240,165,0,.3);
    --emblem-bg:    rgba(240,165,0,.1);
    --emblem-color: #f0a500;
  }

  body {
    font-family: 'Source Sans 3', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    transition: background .35s;
  }

  body::before {
    display: none;
  }

  /* ── TOGGLE BUTTON ───────────────────────── */
  .theme-toggle {
    position: fixed;
    top: 16px;
    right: 20px;
    z-index: 200;
    display: flex;
    align-items: center;
    gap: 7px;
    background: var(--toggle-bg);
    border: 1px solid var(--toggle-border);
    border-radius: 999px;
    padding: 7px 16px 7px 11px;
    cursor: pointer;
    transition: background .35s, border-color .35s;
    outline: none;
  }

  .theme-toggle:hover { opacity: .8; }

  .theme-toggle svg {
    width: 16px;
    height: 16px;
    color: var(--toggle-text);
    flex-shrink: 0;
    transition: color .35s;
  }

  .theme-toggle .lbl {
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1px;
    color: var(--toggle-text);
    transition: color .35s;
  }

  /* ── EMBLEM ──────────────────────────────── */
  .emblem {
    text-align: center;
    margin-bottom: 30px;
    animation: fadeDown .55s ease both;
  }

  .emblem-badge {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    background: var(--emblem-bg);
    border: 1px solid var(--emblem-border);
    border-radius: 5px;
    padding: 8px 20px;
    transition: background .35s, border-color .35s;
  }

  .emblem-badge svg { width: 30px; height: 30px; }

  .emblem-name {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 17px;
    color: var(--emblem-color);
    letter-spacing: 2px;
    transition: color .35s;
  }

  .emblem h1 {
    font-family: 'Rajdhani', sans-serif;
    font-size: 12px;
    letter-spacing: 3px;
    color: var(--emblem-color);
    text-transform: uppercase;
    margin-top: 12px;
    opacity: .75;
    transition: color .35s;
  }

  /* ── CARD ────────────────────────────────── */
  .card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 10px;
    padding: 38px 44px 44px;
    width: 100%;
    max-width: 400px;
    backdrop-filter: blur(12px);
    box-shadow: var(--shadow);
    animation: fadeUp .55s ease .1s both;
    transition: background .35s, border-color .35s, box-shadow .35s;
  }

  .card h2 {
    font-family: 'Rajdhani', sans-serif;
    font-size: 25px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 1px;
    margin-bottom: 5px;
    transition: color .35s;
  }

  .card p.sub {
    font-size: 13px;
    color: var(--text-sub);
    margin-bottom: 28px;
    transition: color .35s;
  }

  /* ── FIELDS ──────────────────────────────── */
  .field { margin-bottom: 18px; }

  .field label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--label);
    margin-bottom: 7px;
    transition: color .35s;
  }

  .field input {
    width: 100%;
    background: var(--input-bg);
    border: 1px solid var(--input-border);
    border-radius: 6px;
    padding: 11px 14px;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 15px;
    color: var(--input-text);
    outline: none;
    transition: border-color .2s, background .35s, color .35s, box-shadow .2s;
  }

  .field input:focus {
    border-color: var(--input-focus);
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--input-focus) 18%, transparent);
  }

  .field input::placeholder { color: var(--placeholder); }

  /* ── BUTTON ──────────────────────────────── */
  .btn {
    width: 100%;
    padding: 12px;
    background: var(--accent);
    color: var(--accent-text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity .2s, transform .1s, background .35s, color .35s;
  }

  .btn:hover  { opacity: .86; }
  .btn:active { transform: scale(.98); }

  .error-msg {
    color: var(--red);
    font-size: 13px;
    margin-top: 12px;
    min-height: 18px;
    text-align: center;
    transition: color .35s;
  }

  @keyframes fadeDown { from { opacity:0; transform:translateY(-14px) } to { opacity:1; transform:none } }
  @keyframes fadeUp   { from { opacity:0; transform:translateY(14px)  } to { opacity:1; transform:none } }
</style>
</head>
<body>

<!-- ── THEME TOGGLE ─────────────────────────── -->
<button class="theme-toggle" id="themeBtn" onclick="toggleTheme()" title="Switch theme">
  <!-- Moon (shown in light mode → click to go dark) -->
  <svg id="iconMoon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
       fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
  </svg>
  <!-- Sun (shown in dark mode → click to go light) -->
  <svg id="iconSun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
       fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
       style="display:none">
    <circle cx="12" cy="12" r="5"/>
    <line x1="12" y1="1"  x2="12" y2="3"/>  <line x1="12" y1="21" x2="12" y2="23"/>
    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>  <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
    <line x1="1"  y1="12" x2="3"  y2="12"/>  <line x1="21" y1="12" x2="23" y2="12"/>
    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>  <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
  </svg>
  <span class="lbl" id="themeLabel">Dark</span>
</button>

<!-- ── EMBLEM ──────────────────────────────── -->
<div class="emblem">
  <div class="emblem-badge">
    <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="20" cy="20" r="18" stroke="var(--emblem-color)" stroke-width="2"/>
      <path d="M12 20h16M20 12v16" stroke="var(--emblem-color)" stroke-width="2" stroke-linecap="round"/>
      <circle cx="20" cy="20" r="4" fill="var(--emblem-color)"/>
    </svg>
    <span class="emblem-name">Steno PORTAL</span>
  </div>
  <h1>Staff Selection Commission &nbsp;·&nbsp; Stenographer Skill Test</h1>
</div>

<!-- ── CARD ────────────────────────────────── -->
<div class="card">
  <h2>Start Skill Test</h2>
  <p class="sub">Enter your credentials to begin the transcription test.</p>

  <div class="field">
    <label>Student ID</label>
    <input id="studentId" type="text" placeholder="e.g. STU001" autocomplete="off">
  </div>

  <div class="field">
    <label>Passage Code</label>
    <input id="passageCode" type="text" placeholder="e.g. P001" autocomplete="off">
  </div>

  <button class="btn" onclick="startTest()">Begin Test</button>
  <p class="error-msg" id="msg"></p>
</div>

<script>
  const html       = document.documentElement;
  const iconSun    = document.getElementById("iconSun");
  const iconMoon   = document.getElementById("iconMoon");
  const themeLabel = document.getElementById("themeLabel");

  // Restore saved preference
  applyTheme(localStorage.getItem("ssc-theme") || "light");

  function applyTheme(theme) {
    html.setAttribute("data-theme", theme);
    localStorage.setItem("ssc-theme", theme);
    const isDark = theme === "dark";
    iconSun.style.display   = isDark ? "block" : "none";
    iconMoon.style.display  = isDark ? "none"  : "block";
    themeLabel.textContent  = isDark ? "Light" : "Dark";
  }

  function toggleTheme() {
    applyTheme(html.getAttribute("data-theme") === "dark" ? "light" : "dark");
  }

  // ── Form ──────────────────────────────────
  const msgEl = document.getElementById("msg");

  async function startTest() {
    msgEl.textContent = "";
    const studentId   = document.getElementById("studentId").value.trim();
    const passageCode = document.getElementById("passageCode").value.trim();

    if (!studentId || !passageCode) {
      msgEl.textContent = "Both Student ID and Passage Code are required.";
      return;
    }

    const res  = await fetch("/start-test", {
      method:  "POST",
      headers: { "Content-Type": "application/json" },
      body:    JSON.stringify({ student_id: studentId, passage_code: passageCode })
    });

    const data = await res.json();

    if (data.status === "ok") {
      window.location = "/typing/" + passageCode + "?student=" + encodeURIComponent(studentId);
    } else {
      msgEl.textContent = data.message;
    }
  }
</script>

</body>
</html>
